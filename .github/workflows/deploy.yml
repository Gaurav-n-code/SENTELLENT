name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: ap-south-1
  APP_NAME: sentellent
  ENVIRONMENT: prod

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7

      - name: Terraform Init
        working-directory: ./infra
        run: |
          terraform init \
            -backend-config="bucket=sentellent-terraform-state" \
            -backend-config="key=infra/terraform.tfstate" \
            -backend-config="region=ap-south-1"

      - name: Terraform Plan
        working-directory: ./infra
        run: terraform plan -out=tfplan
        env:
          TF_VAR_gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          TF_VAR_google_client_id: ${{ secrets.GOOGLE_CLIENT_ID }}
          TF_VAR_jwt_secret_key: ${{ secrets.JWT_SECRET_KEY }}

      - name: Terraform Apply
        working-directory: ./infra
        run: terraform apply tfplan

  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: [terraform]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Get ECR repository URIs
        id: ecr
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "backend_repo=$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/${APP_NAME}-backend-${ENVIRONMENT}" >> $GITHUB_OUTPUT
          echo "frontend_repo=$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/${APP_NAME}-frontend-${ENVIRONMENT}" >> $GITHUB_OUTPUT

      - name: Get ALB DNS
        id: alb
        run: |
          ALB_DNS=$(aws elbv2 describe-load-balancers \
            --names "${APP_NAME}-${ENVIRONMENT}" \
            --query "LoadBalancers[0].DNSName" \
            --output text)
          echo "dns=$ALB_DNS" >> $GITHUB_OUTPUT

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.ecr.outputs.backend_repo }}:latest,${{ steps.ecr.outputs.backend_repo }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.ecr.outputs.frontend_repo }}:latest,${{ steps.ecr.outputs.frontend_repo }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=http://${{ steps.alb.outputs.dns }}
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy backend to ECS
        run: |
          aws ecs update-service \
            --cluster ${APP_NAME}-${ENVIRONMENT} \
            --service ${APP_NAME}-backend-${ENVIRONMENT} \
            --force-new-deployment

      - name: Deploy frontend to ECS
        run: |
          aws ecs update-service \
            --cluster ${APP_NAME}-${ENVIRONMENT} \
            --service ${APP_NAME}-frontend-${ENVIRONMENT} \
            --force-new-deployment

      - name: Wait for backend deployment
        run: |
          aws ecs wait services-stable \
            --cluster ${APP_NAME}-${ENVIRONMENT} \
            --services ${APP_NAME}-backend-${ENVIRONMENT}
          echo "Backend deployment complete"

      - name: Wait for frontend deployment
        run: |
          aws ecs wait services-stable \
            --cluster ${APP_NAME}-${ENVIRONMENT} \
            --services ${APP_NAME}-frontend-${ENVIRONMENT}
          echo "Frontend deployment complete"
